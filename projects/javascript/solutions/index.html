<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🗺️ Adventure Quest — SOLUTION</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 5px;
            color: #e94560;
        }

        .subtitle {
            text-align: center;
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 25px;
        }

        .score-bar {
            display: flex;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.08);
            padding: 10px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 1rem;
        }

        .score-bar span {
            color: #53d8fb;
            font-weight: bold;
        }

        #story-text {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            font-size: 1.1rem;
            line-height: 1.7;
            min-height: 120px;
        }

        #choices-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .choice-btn {
            background: linear-gradient(135deg, #e94560 0%, #c23152 100%);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 12px;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
        }

        .choice-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(233, 69, 96, 0.4);
        }

        .choice-btn:active {
            transform: translateY(0);
        }

        .restart-btn {
            background: linear-gradient(135deg, #53d8fb 0%, #3aa8d8 100%);
            color: #1a1a2e;
            font-weight: bold;
        }

        .restart-btn:hover {
            box-shadow: 0 8px 25px rgba(83, 216, 251, 0.4);
        }

        .history {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.85rem;
            color: #777;
        }

        .history h3 {
            color: #aaa;
            margin-bottom: 8px;
        }

        #history-log {
            max-height: 150px;
            overflow-y: auto;
            padding-left: 20px;
        }

        #history-log li {
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>🗺️ Adventure Quest</h1>
        <p class="subtitle">Programming Merit Badge — Req 5b (SOLUTION)</p>

        <div class="score-bar">
            <div>⭐ Score: <span id="score-display">0</span></div>
            <div>🗺️ Room: <span id="room-display">1</span></div>
        </div>

        <div id="story-text">
            Loading adventure...
        </div>

        <div id="choices-container">
        </div>

        <div class="history">
            <h3>📜 Your Journey:</h3>
            <ol id="history-log"></ol>
        </div>
    </div>

    <script src="adventure_game.js"></script>

</body>
</html>
